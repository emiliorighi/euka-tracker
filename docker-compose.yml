# Full stack: nginx serves feather tiles + Parquet; proxies Next.js app.
# Usage: docker compose build --no-cache next && docker compose up
# Open: http://localhost:8080/taxonomy/atlas  (scatter)  or  /explore
# Tile version: TILE_VERSION=v20260614 docker compose up --build

services:
  next:
    build:
      context: ./next-app
      args:
        NEXT_PUBLIC_TILE_URL: /tiles/species/landscape/${TILE_VERSION:-v20260614}
        NEXT_PUBLIC_TILE_VERSION: ${TILE_VERSION:-v20260614}
    environment:
      NEXT_PUBLIC_TILE_URL: /tiles/species/landscape/${TILE_VERSION:-v20260614}
      NEXT_PUBLIC_TILE_VERSION: ${TILE_VERSION:-v20260614}
      NEXT_PUBLIC_TAXON_ROLLUPS_URL: /staged/06_taxon_rollups.tsv
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tiles:/var/www/tiles:ro
      - ./data/scatter:/var/www/parquet:ro
      - ./data/staged:/var/www/staged:ro
    depends_on:
      - next
    restart: unless-stopped
